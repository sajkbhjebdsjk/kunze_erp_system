version: '3.8'

services:
  # ==================== Web应用服务 ====================
  web:
    build: .
    container_name: kunze-erp-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      # 持久化上传文件
      - ./uploads:/app/backend/uploads
      # 持久化日志
      - ./logs:/app/backend/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==================== MySQL数据库服务 ====================
  db:
    image: mysql:8.0
    container_name: kunze-erp-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Kunze@ERP2026_Secure}
      MYSQL_DATABASE: ${DB_NAME:-erp_system}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"  # 生产环境建议移除此行，避免暴露数据库端口
    volumes:
      # 数据持久化
      - mysql_data:/var/lib/mysql
      # 初始化SQL脚本（可选）
      - ./database.sql:/docker-entrypoint-initdb.d/01-database.sql:ro
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=200
      --innodb-buffer-pool-size=256M
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== Nginx反向代理（生产环境推荐）====================
  nginx:
    image: nginx:alpine
    container_name: kunze-erp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL证书目录
      - ./uploads:/var/www/uploads:ro
    depends_on:
      - web
    networks:
      - erp-network
    profiles:
      - production  # 仅在 production profile 下启动

# ==================== 网络配置 ====================
networks:
  erp-network:
    driver: bridge

# ==================== 数据卷 ====================
volumes:
  mysql_data:
    driver: local
