<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="js/config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>合同签署 - 移动版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        emerald: '#10b981',
                        rose: '#f43f5e',
                        dark: '#0f172a',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; height: 100vh; margin: 0; padding: 0; overflow-x: hidden; }
        .container { height: 100vh; display: flex; flex-direction: column; }
        .glass-header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { display: none; }
        .form-field { transition: all 0.3s ease; }
        .form-field:focus-within { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2); }
        .signature-pad { border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 8px; background: white; cursor: crosshair; }
        .contract-content { background: white; color: black; padding: 20px; border-radius: 8px; line-height: 1.6; }
        .contract-content p { margin-bottom: 16px; }
        .contract-content h1, .contract-content h2 { margin: 20px 0 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="glass-header px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button id="backBtn" class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border border-white/10">
                    <i data-lucide="arrow-left" class="w-4 h-4 text-slate-400"></i>
                </button>
                <div>
                    <h1 class="text-xl font-display font-bold" id="contractTitle">合同签署</h1>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Contract Signing</p>
                    <!-- Success View (Hidden initially) -->
        <div id="successView" class="hidden fixed inset-0 z-50 bg-dark/95 backdrop-blur-sm overflow-y-auto">
            <div class="min-h-screen flex flex-col px-6 py-6 max-w-lg mx-auto">
                <div class="flex items-center justify-between mb-4">
                    <h1 class="text-xl font-display font-bold text-emerald-400">签署成功</h1>
                    <span class="text-xs text-slate-500 font-mono" id="successTime"></span>
                </div>

                <div class="bg-gradient-to-br from-emerald-500/20 to-green-600/20 border border-emerald-500/30 rounded-2xl p-5 text-center mb-4">
                    <div class="w-14 h-14 bg-emerald-500 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i data-lucide="check" class="w-7 h-7 text-white"></i>
                    </div>
                    <p class="text-sm font-bold text-emerald-400">合同已成功签署并保存</p>
                    <p class="text-[11px] text-slate-500 mt-1">合同编号：<span id="successContractNo" class="font-mono"></span></p>
                </div>

                <div class="bg-white rounded-2xl shadow-xl overflow-hidden flex-1 flex flex-col min-h-0">
                    <div class="px-4 py-3 bg-slate-50 border-b border-slate-200 flex items-center gap-2">
                        <i data-lucide="file-text" class="w-4 h-4 text-primary"></i>
                        <span class="text-sm font-semibold text-slate-800">已签署合同</span>
                    </div>
                    <div id="signedContractContent" class="contract-content flex-1 overflow-y-auto p-4">
                        <p class="text-center text-slate-400 py-8">正在加载已签署的合同内容...</p>
                    </div>
                    <div class="px-4 py-3 bg-slate-50 border-t border-slate-200">
                        <button onclick="window.close();" id="acknowledgeBtn" class="w-full bg-primary hover:bg-primary/90 text-white py-3.5 rounded-xl font-semibold transition-colors shadow-lg shadow-primary/25 active:scale-[0.98]">
                            我已知晓
                        </button>
                        <p class="text-[10px] text-slate-400 text-center mt-2">点击上方按钮关闭本页面</p>
                    </div>
                </div>
            </div>
        </div>

    </div>
            </div>
        </header>

        <!-- Form Content -->
        <div class="flex-1 overflow-y-auto custom-scrollbar pb-24">
            <div class="px-6 py-6 space-y-6">
                <!-- 合同信息 -->
                <div class="bg-slate-800/50 border border-white/10 rounded-xl p-4">
                    <h2 class="text-lg font-bold mb-2">合同信息</h2>
                    <p class="text-sm text-slate-400" id="contractDescription">加载中...</p>
                </div>

                <!-- 乙方信息 -->
                <div id="partyBInfo" class="bg-slate-800/50 border border-white/10 rounded-xl p-4">
                    <h2 class="text-lg font-bold mb-4">乙方信息</h2>
                    <div class="space-y-4">
                        <div class="form-field">
                            <label class="block text-sm font-medium text-slate-300 mb-2">身份证号码</label>
                            <input type="text" id="idCard" class="w-full bg-slate-900 border border-white/10 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30" placeholder="请输入身份证号码">
                        </div>
                        <div class="form-field">
                            <label class="block text-sm font-medium text-slate-300 mb-2">送达地址</label>
                            <input type="text" id="address" class="w-full bg-slate-900 border border-white/10 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30" placeholder="请输入送达地址">
                        </div>
                        <div class="form-field">
                            <label class="block text-sm font-medium text-slate-300 mb-2">电子邮箱/QQ/微信号码</label>
                            <input type="text" id="contact" class="w-full bg-slate-900 border border-white/10 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30" placeholder="请输入联系方式">
                        </div>
                    </div>
                </div>

                <!-- 合同预览 -->
                <div class="bg-slate-800/50 border border-white/10 rounded-xl p-4">
                    <h2 class="text-lg font-bold mb-4">合同预览</h2>
                    <div class="contract-content" id="contractPreview">
                        <p class="text-center text-slate-500">加载中...</p>
                    </div>
                </div>

                <!-- 签名区域 -->
                <div id="signatureSection" class="bg-slate-800/50 border border-white/10 rounded-xl p-4">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-bold">手写签名</h2>
                        <button id="clearSignature" class="text-sm text-primary hover:text-primary/80 transition-colors">
                            清除
                        </button>
                    </div>
                    <canvas id="signatureCanvas" class="signature-pad w-full h-40"></canvas>
                    <p class="text-xs text-slate-400 mt-2">请在上方区域签名</p>
                </div>

                <!-- 提交按钮 -->
                <div class="pt-4">
                    <button id="submitBtn" class="w-full bg-primary hover:bg-primary/90 text-white py-3 rounded-xl font-semibold transition-colors">
                        签署合同
                    </button>
                </div>
            </div>
        </div>

        <!-- Global Navigation -->
        <div class="fixed bottom-0 left-0 right-0 h-20 flex justify-center items-center z-50 bg-slate-900/90 backdrop-blur-xl border-t border-white/10">
            <div class="flex justify-between items-center w-full px-6">
                <button class="flex flex-col items-center justify-center text-primary" onclick="window.location.href='mobile-approval.html'">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    <span class="text-xs mt-1">首页</span>
                </button>
                <button class="flex flex-col items-center justify-center text-slate-500" onclick="window.location.href='mobile-approval-page.html'">
                    <i data-lucide="clipboard-list" class="w-5 h-5"></i>
                    <span class="text-xs mt-1">审批</span>
                </button>
                <button class="flex flex-col items-center justify-center text-slate-500" onclick="window.location.href='mobile-my-page.html'">
                    <i data-lucide="user" class="w-5 h-5"></i>
                    <span class="text-xs mt-1">我的</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 -translate-y-full opacity-0 transition-all duration-500 z-[100] w-[280px]">
        <div class="bg-primary/90 backdrop-blur-md text-white px-5 py-3 rounded-2xl flex items-center gap-3 shadow-2xl">
            <i data-lucide="sparkles" class="w-4 h-4"></i>
            <p class="text-xs font-bold leading-tight" id="toast-message">操作成功！</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();

            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            let toastTimer = null;

            // 显示Toast通知
            function showToast(message) {
                if(toastTimer) clearTimeout(toastTimer);
                toastMessage.textContent = message;
                toast.classList.remove('-translate-y-full', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');
                toastTimer = setTimeout(() => {
                    toast.classList.add('-translate-y-full', 'opacity-0');
                    toast.classList.remove('translate-y-0', 'opacity-100');
                }, 2500);
            }

            // 获取URL参数
            function getUrlParam(name) {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get(name);
            }

            // 初始化签名画布
            function initSignatureCanvas() {
                const canvas = document.getElementById('signatureCanvas');
                const ctx = canvas.getContext('2d');
                let isDrawing = false;
                let lastX = 0;
                let lastY = 0;

                // 设置画布尺寸
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;

                // 绘制函数
                function draw(e) {
                    if (!isDrawing) return;
                    ctx.lineWidth = 2;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.strokeStyle = '#000';

                    ctx.beginPath();
                    ctx.moveTo(lastX, lastY);
                    ctx.lineTo(e.offsetX, e.offsetY);
                    ctx.stroke();

                    [lastX, lastY] = [e.offsetX, e.offsetY];
                }

                // 事件监听器
                canvas.addEventListener('mousedown', (e) => {
                    isDrawing = true;
                    [lastX, lastY] = [e.offsetX, e.offsetY];
                });

                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', () => isDrawing = false);
                canvas.addEventListener('mouseout', () => isDrawing = false);

                // 触摸事件支持
                canvas.addEventListener('touchstart', (e) => {
                    isDrawing = true;
                    const touch = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    [lastX, lastY] = [touch.clientX - rect.left, touch.clientY - rect.top];
                });

                canvas.addEventListener('touchmove', (e) => {
                    if (!isDrawing) return;
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    const currentX = touch.clientX - rect.left;
                    const currentY = touch.clientY - rect.top;

                    ctx.lineWidth = 2;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.strokeStyle = '#000';

                    ctx.beginPath();
                    ctx.moveTo(lastX, lastY);
                    ctx.lineTo(currentX, currentY);
                    ctx.stroke();

                    [lastX, lastY] = [currentX, currentY];
                });

                canvas.addEventListener('touchend', () => isDrawing = false);

                // 清除签名
                document.getElementById('clearSignature').addEventListener('click', function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                });
            }

            // 加载合同详情
            function loadContractDetails() {
                const contractId = getUrlParam('contract_id');
                const flowId = getUrlParam('flow_id');
                const isViewMode = getUrlParam('view') === '1';

                if (!contractId) {
                    showToast('缺少合同ID');
                    return;
                }

                // 显示加载状态
                document.getElementById('contractDescription').textContent = '加载中...';
                document.getElementById('contractPreview').innerHTML = '<p class="text-center text-slate-500">加载中...</p>';

                if (isViewMode && flowId) {
                    // 查看模式：获取已签署的合同
                    const signedUrl = `window.API_BASE_URL/api/contracts/signed/${flowId}`;
                    console.log('Signed URL:', signedUrl);
                    fetch(signedUrl)
                        .then(response => {
                            console.log('Signed response status:', response.status);
                            if (!response.ok) {
                                throw new Error('网络响应错误');
                            }
                            return response.json();
                        })
                        .then(data => {
                            console.log('Signed response data:', data);
                            if (data.success) {
                                const contract = data.data;
                                document.getElementById('contractTitle').textContent = contract.contract_name || '合同查看';
                                document.getElementById('contractDescription').textContent = `合同名称: ${contract.contract_name} | 签署时间: ${contract.signed_at}`;
                                
                                // 显示合同内容
                                document.getElementById('contractPreview').innerHTML = contract.content || '<p class="text-center text-slate-500">合同内容为空</p>';
                            } else {
                                console.error('加载已签署合同失败');
                                document.getElementById('contractDescription').textContent = '加载失败';
                                document.getElementById('contractPreview').innerHTML = '<p class="text-center text-slate-500">加载失败</p>';
                                showToast('加载已签署合同失败: ' + (data.message || '未知错误'));
                            }
                        })
                        .catch(error => {
                            console.error('加载已签署合同失败:', error);
                            document.getElementById('contractDescription').textContent = '加载失败';
                            document.getElementById('contractPreview').innerHTML = '<p class="text-center text-slate-500">加载失败</p>';
                            showToast('网络错误，请稍后重试: ' + error.message);
                        });
                } else {
                    // 签署模式：获取合同模板
                    const contractUrl = `window.API_BASE_URL/api/contracts/${contractId}`;
                    console.log('Contract URL:', contractUrl);
                    fetch(contractUrl)
                        .then(response => {
                            console.log('Contract response status:', response.status);
                            if (!response.ok) {
                                throw new Error('网络响应错误');
                            }
                            return response.json();
                        })
                        .then(data => {
                            console.log('Contract response data:', data);
                            if (data.success) {
                                const contract = data.data;
                                document.getElementById('contractTitle').textContent = contract.name;
                                document.getElementById('contractDescription').textContent = `合同名称: ${contract.name} | 创建时间: ${contract.created_at}`;
                                
                                // 显示合同内容
                                document.getElementById('contractPreview').innerHTML = contract.content || '<p class="text-center text-slate-500">合同内容为空</p>';
                            } else {
                                console.error('加载合同详情失败');
                                document.getElementById('contractDescription').textContent = '加载失败';
                                document.getElementById('contractPreview').innerHTML = '<p class="text-center text-slate-500">加载失败</p>';
                                showToast('加载合同详情失败: ' + (data.message || '未知错误'));
                            }
                        })
                        .catch(error => {
                            console.error('加载合同详情失败:', error);
                            document.getElementById('contractDescription').textContent = '加载失败';
                            document.getElementById('contractPreview').innerHTML = '<p class="text-center text-slate-500">加载失败</p>';
                            showToast('网络错误，请稍后重试: ' + error.message);
                        });
                }
            }

            // 提交签署
            document.getElementById('submitBtn').addEventListener('click', function() {
                const contractId = getUrlParam('contract_id');
                const flowId = getUrlParam('flow_id');
                const idCard = document.getElementById('idCard').value;
                const address = document.getElementById('address').value;
                const contact = document.getElementById('contact').value;
                const canvas = document.getElementById('signatureCanvas');
                const signatureData = canvas.toDataURL('image/png');

                console.log('Contract ID:', contractId);
                console.log('Flow ID:', flowId);
                console.log('ID Card:', idCard);
                console.log('Address:', address);
                console.log('Contact:', contact);
                console.log('Signature Data:', signatureData.substring(0, 100) + '...');

                if (!contractId || !flowId) {
                    showToast('缺少必要参数');
                    return;
                }

                if (!idCard || !address || !contact) {
                    showToast('请填写完整的乙方信息');
                    return;
                }

                if (!signatureData || signatureData === 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==') {
                    showToast('请签署您的姓名');
                    return;
                }

                // 显示加载状态
                showToast('正在处理，请稍候...');

                // 提交签署数据
                const apiUrl = `${window.API_BASE_URL}$1`;
                console.log('API URL:', apiUrl);
                
                // 限制签名数据大小
                const maxSignatureSize = 1000000; // 1MB
                if (signatureData.length > maxSignatureSize) {
                    showToast('签名数据过大，请重新签署');
                    return;
                }
                
                console.log('Signature data length:', signatureData.length);
                
                // 实际的API调用
                fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contract_id: contractId,
                        flow_id: flowId,
                        id_card: idCard,
                        address: address,
                        contact: contact,
                        signature: signatureData
                    })
                })
                .then(response => {
                    console.log('Response status:', response.status);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('Response data:', data);
                    if (data.success) {
                        showToast('合同签署成功');
                        // 保存签署状态和合同ID到本地存储
                        localStorage.setItem(`contract_signed_${flowId}`, 'signed');
                        localStorage.setItem(`contract_id_${flowId}`, contractId);
                        // 跳转到流程申请页面
                        setTimeout(() => {
                            window.location.href = `mobile-flow-apply.html?id=${flowId}`;
                        }, 1500);
                    } else {
                        const errorMessage = data.message || '未知错误';
                        console.error('签署失败:', errorMessage);
                        showToast('签署失败: ' + errorMessage);
                    }
                })
                .catch(error => {
                    console.error('签署合同失败:', error);
                    showToast('网络错误，请稍后重试: ' + error.message);
                });
            });

            // 返回按钮点击事件
            document.getElementById('backBtn').addEventListener('click', function() {
                const flowId = getUrlParam('flow_id');
                if (flowId) {
                    window.location.href = `mobile-flow-apply.html?id=${flowId}`;
                } else {
                    window.history.back();
                }
            });

            // 检查是否为查看模式
            const isViewMode = getUrlParam('view') === '1';

            // 初始化页面模式
            function initPageMode() {
                if (isViewMode) {
                    // 隐藏乙方信息输入和签名区域
                    const partyBInfo = document.getElementById('partyBInfo');
                    if (partyBInfo) {
                        partyBInfo.style.display = 'none';
                    }
                    
                    const signatureSection = document.getElementById('signatureSection');
                    if (signatureSection) {
                        signatureSection.style.display = 'none';
                    }
                    
                    const submitBtn = document.getElementById('submitBtn');
                    if (submitBtn) {
                        submitBtn.style.display = 'none';
                    }
                    
                    // 修改标题为查看合同
                    const contractTitle = document.getElementById('contractTitle');
                    if (contractTitle) {
                        contractTitle.textContent = '查看合同';
                    }
                }
            }

            // 初始化签名画布
            initSignatureCanvas();

            // 加载合同详情
            loadContractDetails();

            // 初始化页面模式
            initPageMode();
        });
    </script>
</body>
</html>
