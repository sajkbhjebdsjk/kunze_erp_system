<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的 - 移动版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        emerald: '#10b981',
                        rose: '#f43f5e',
                        dark: '#0f172a',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; height: 100vh; margin: 0; padding: 0; overflow-x: hidden; }
        .container { height: 100vh; display: flex; flex-direction: column; }
        .glass-header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Content Container -->
        <div class="flex-1 flex flex-col">
        <!-- Header -->
        <header class="glass-header px-6 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-display font-bold">个人中心</h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Personal Center</p>
            </div>
            <div class="flex gap-3">
                <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border border-white/10"><i data-lucide="settings" class="w-4 h-4 text-slate-400"></i></div>
            </div>
        </header>

        <!-- User Profile -->
        <div class="px-6 py-6" id="user-profile">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 rounded-2xl bg-primary/20 flex items-center justify-center border border-primary/30">
                    <i data-lucide="user" class="text-primary w-8 h-8"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold">加载中...</h2>
                    <p class="text-sm text-slate-500">加载中...</p>
                    <p class="text-xs text-slate-600">加载中...</p>
                </div>
            </div>
        </div>

        <!-- Menu Items -->
        <div class="flex-1 overflow-y-auto px-6 pb-24 custom-scrollbar">
            <div class="space-y-4">
                <div class="bg-slate-800/40 border border-white/5 rounded-[2rem] p-5">
                    <h3 class="text-lg font-bold mb-4">设置</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center p-3 bg-slate-900/30 rounded-xl">
                            <div class="flex items-center gap-3">
                                <i data-lucide="user-circle" class="w-5 h-5 text-primary"></i>
                                <span class="text-sm font-medium">个人信息</span>
                            </div>
                            <i data-lucide="chevron-right" class="w-4 h-4 text-slate-500"></i>
                        </div>
                        <div class="flex justify-between items-center p-3 bg-slate-900/30 rounded-xl">
                            <div class="flex items-center gap-3">
                                <i data-lucide="lock" class="w-5 h-5 text-primary"></i>
                                <span class="text-sm font-medium">修改密码</span>
                            </div>
                            <i data-lucide="chevron-right" class="w-4 h-4 text-slate-500"></i>
                        </div>
                        <div class="flex justify-between items-center p-3 bg-slate-900/30 rounded-xl">
                            <div class="flex items-center gap-3">
                                <i data-lucide="bell" class="w-5 h-5 text-primary"></i>
                                <span class="text-sm font-medium">通知设置</span>
                            </div>
                            <i data-lucide="chevron-right" class="w-4 h-4 text-slate-500"></i>
                        </div>
                        <div class="flex justify-between items-center p-3 bg-slate-900/30 rounded-xl">
                            <div class="flex items-center gap-3">
                                <i data-lucide="help-circle" class="w-5 h-5 text-primary"></i>
                                <span class="text-sm font-medium">帮助中心</span>
                            </div>
                            <i data-lucide="chevron-right" class="w-4 h-4 text-slate-500"></i>
                        </div>
                    </div>
                </div>

                <!-- About -->
                <div class="bg-slate-800/40 border border-white/5 rounded-[2rem] p-5">
                    <h3 class="text-lg font-bold mb-4">关于</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center p-3 bg-slate-900/30 rounded-xl">
                            <div class="flex items-center gap-3">
                                <i data-lucide="info" class="w-5 h-5 text-primary"></i>
                                <span class="text-sm font-medium">版本信息</span>
                            </div>
                            <span class="text-xs text-slate-500">v1.0.0</span>
                        </div>
                        <div class="flex justify-between items-center p-3 bg-slate-900/30 rounded-xl">
                            <div class="flex items-center gap-3">
                                <i data-lucide="file-text" class="w-5 h-5 text-primary"></i>
                                <span class="text-sm font-medium">用户协议</span>
                            </div>
                            <i data-lucide="chevron-right" class="w-4 h-4 text-slate-500"></i>
                        </div>
                        <div class="flex justify-between items-center p-3 bg-slate-900/30 rounded-xl">
                            <div class="flex items-center gap-3">
                                <i data-lucide="shield" class="w-5 h-5 text-primary"></i>
                                <span class="text-sm font-medium">隐私政策</span>
                            </div>
                            <i data-lucide="chevron-right" class="w-4 h-4 text-slate-500"></i>
                        </div>
                    </div>
                </div>

                <!-- Logout Button -->
                <button class="w-full bg-rose-500/10 border border-rose-500/20 text-rose-500 h-14 rounded-2xl font-bold text-sm flex items-center justify-center gap-2">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    退出登录
                </button>
            </div>
        </div>
        </div>

        <!-- Global Navigation -->
        <div class="fixed bottom-0 left-0 right-0 h-20 flex justify-center items-center z-50 bg-slate-900/90 backdrop-blur-xl border-t border-white/10">
            <div class="flex justify-between items-center w-full px-6">
                <button class="flex flex-col items-center justify-center text-primary" onclick="window.location.href='mobile-approval.html'">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    <span class="text-xs mt-1">首页</span>
                </button>
                <button class="flex flex-col items-center justify-center text-slate-500" onclick="window.location.href='mobile-approval-page.html'">
                    <i data-lucide="clipboard-list" class="w-5 h-5"></i>
                    <span class="text-xs mt-1">审批</span>
                </button>
                <button class="flex flex-col items-center justify-center text-slate-500" onclick="window.location.href='mobile-my-page.html'">
                    <i data-lucide="user" class="w-5 h-5"></i>
                    <span class="text-xs mt-1">我的</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 -translate-y-full opacity-0 transition-all duration-500 z-[100] w-[280px]">
        <div class="bg-primary/90 backdrop-blur-md text-white px-5 py-3 rounded-2xl flex items-center gap-3 shadow-2xl">
            <i data-lucide="sparkles" class="w-4 h-4"></i>
            <p class="text-xs font-bold leading-tight" id="toast-message">操作成功！</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();

            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            let toastTimer = null;

            // 显示Toast通知
            function showToast(message) {
                if(toastTimer) clearTimeout(toastTimer);
                toastMessage.textContent = message;
                toast.classList.remove('-translate-y-full', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');
                toastTimer = setTimeout(() => {
                    toast.classList.add('-translate-y-full', 'opacity-0');
                    toast.classList.remove('translate-y-0', 'opacity-100');
                }, 2500);
            }

            // 加载用户信息
            function loadUserInfo() {
                // 从本地存储获取用户信息
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user) {
                    // 用户未登录，跳转到登录页面
                    window.location.href = 'mobile-login.html';
                    return;
                }

                // 更新用户信息显示
                const userProfile = document.getElementById('user-profile');
                userProfile.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-16 h-16 rounded-2xl bg-primary/20 flex items-center justify-center border border-primary/30">
                            <i data-lucide="user" class="text-primary w-8 h-8"></i>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold">${user.name}</h2>
                            <p class="text-sm text-slate-500">${user.city_name} - ${user.department_name} - ${user.position}</p>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            }

            // 加载用户信息
            loadUserInfo();

            // 退出登录
            document.querySelector('button').addEventListener('click', function() {
                if (this.textContent.includes('退出登录')) {
                    if (confirm('确定要退出登录吗？')) {
                        // 清除本地存储
                        localStorage.removeItem('user');
                        showToast('退出登录成功！');
                        setTimeout(() => {
                            window.location.href = 'mobile-login.html';
                        }, 1500);
                    }
                }
            });
        });
    </script>
</body>
</html>
